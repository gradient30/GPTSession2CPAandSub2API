name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CF_PAGES_PROJECT: gptsession2cpaandsub2api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci
      - run: npx playwright install chromium

      - name: Build and verify
        run: npm run acceptance

      - name: Prepare static site artifact
        run: |
          mkdir -p site-out
          cp docs/index.html docs/favicon.svg docs/.nojekyll site-out/
          test -f site-out/index.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site-out
          include-hidden-files: true

  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudflare-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - name: Verify site artifact
        run: |
          ls -la site/
          test -f site/index.html
          test -f site/favicon.svg

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is empty"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is empty"
            exit 1
          fi
          echo "Cloudflare secrets are present"

      - name: Ensure Cloudflare Pages project exists
        run: |
          if wrangler pages project list --json | jq -e --arg name "$CF_PAGES_PROJECT" '.[] | select(.name == $name)' >/dev/null; then
            echo "Pages project already exists: $CF_PAGES_PROJECT"
          else
            echo "Creating Pages project: $CF_PAGES_PROJECT"
            wrangler pages project create "$CF_PAGES_PROJECT" --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy site \
            --project-name="$CF_PAGES_PROJECT" \
            --branch=main \
            --commit-hash="${{ github.sha }}" \
            --commit-dirty=true
